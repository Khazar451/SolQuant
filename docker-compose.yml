# ═══════════════════════════════════════════════════════════════════
# SolQuant — Three-Tier AI Stack
# ═══════════════════════════════════════════════════════════════════
#
# Architecture:
#   ┌─────────────────┐     ┌──────────────┐     ┌──────────────┐
#   │  orchestrator   │────▶│ inference-   │     │  vector-db   │
#   │  (Java :8081)   │     │ engine       │     │  (Mongo      │
#   │  Spring Boot +  │     │ (Python :8000)│     │   :27017)    │
#   │  LangChain4j    │     │ FastAPI +    │     │  Atlas Local │
#   │                 │     │ llama-cpp    │     │  Vector      │
#   └─────────────────┘     │ MX550 GPU   │     │  Search      │
#                           └──────────────┘     └──────────────┘
#                                  │
#                           ┌──────┴──────┐
#                           │ NVIDIA GPU  │
#                           │ (MX550 2GB) │
#                           └─────────────┘
#
# Networks:
#   solquant-net  — internal bridge for inter-service communication
#
# Volumes:
#   model-cache   — persists downloaded GGUF models across restarts
#   mongo-data    — persists MongoDB data and vector indexes
#   alert-logs    — shared alert log directory
#
# Usage:
#   ./deploy.sh           # full setup + launch
#   docker compose up -d  # if already configured
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Tier 1: LLM Inference Engine (Python + GPU) ─────────────────
  inference-engine:
    build:
      context: .
      dockerfile: inference-engine.Dockerfile
    container_name: solquant-inference
    restart: unless-stopped

    # ── NVIDIA GPU access with strict 2GB memory limit ────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4G          # container RAM limit (not VRAM)

    # ── Environment ───────────────────────────────────────────────
    environment:
      # Override defaults for containerised deployment
      SQ_HOST: "0.0.0.0"
      SQ_PORT: "8000"
      SQ_MODEL_DIR: "/app/models"
      SQ_N_GPU_LAYERS: "24"
      SQ_N_CTX: "2048"
      SQ_VRAM_BUDGET_MB: "1600"
      SQ_LOG_LEVEL: "info"
      # CUDA visible devices (use the MX550)
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      # RAG MongoDB connection (use Docker DNS)
      RAG_MONGO_URI: "mongodb://vector-db:27017"
      RAG_MONGO_DB_NAME: "solquant_rag"
      RAG_EMBEDDING_DEVICE: "cpu"

    ports:
      - "8000:8000"

    volumes:
      - model-cache:/app/models       # persist downloaded GGUF files
      - alert-logs:/app/logs           # shared log directory

    networks:
      - solquant-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s               # model download + load can be slow
      retries: 5

    depends_on:
      vector-db:
        condition: service_healthy


  # ── Tier 2: Vector Database (MongoDB Atlas Local) ───────────────
  vector-db:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: solquant-vector-db
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    networks:
      - solquant-net

    deploy:
      resources:
        limits:
          memory: 1G

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5


  # ── Tier 3: AI Agent Orchestrator (Java Spring Boot) ────────────
  orchestrator:
    build:
      context: ./agent-controller
      dockerfile: Dockerfile
    container_name: solquant-orchestrator
    restart: unless-stopped

    environment:
      # Point LangChain4j at the inference engine via Docker DNS
      SOLQUANT_LLM_BASE_URL: "http://inference-engine:8000"
      SOLQUANT_LLM_GENERATE_PATH: "/generate"
      SOLQUANT_LLM_MAX_TOKENS: "512"
      SOLQUANT_LLM_TEMPERATURE: "0.3"
      SOLQUANT_LLM_TIMEOUT_SECONDS: "120"
      SOLQUANT_ALERTS_LOG_FILE: "/app/logs/alerts.log"
      # Spring server port
      SERVER_PORT: "8081"
      # JVM container-aware memory settings
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"

    ports:
      - "8081:8081"

    volumes:
      - alert-logs:/app/logs           # shared with inference-engine

    networks:
      - solquant-net

    deploy:
      resources:
        limits:
          memory: 512M

    depends_on:
      inference-engine:
        condition: service_healthy


# ── Networks ──────────────────────────────────────────────────────
networks:
  solquant-net:
    driver: bridge
    name: solquant-net


# ── Volumes ──────────────────────────────────────────────────────
volumes:
  model-cache:
    name: solquant-model-cache
  mongo-data:
    name: solquant-mongo-data
  alert-logs:
    name: solquant-alert-logs
